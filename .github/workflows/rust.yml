name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4
      - name: Install pgFormatter
        run: sudo apt-get update && sudo apt-get install -y pgformatter
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo nextest run --profile ci --verbose
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: nextest results
          path: target/nextest/ci/junit.xml
          reporter: java-junit

  clippy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Install SARIF tools
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      - name: Run clippy
        run: cargo clippy --all-targets --all-features --message-format=json
          | clippy-sarif | tee clippy-results.sarif | sarif-fmt
        continue-on-error: true
      - name: Upload findings to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy-results.sarif
          wait-for-processing: true
